<header class="masthead">
  <nav class="site-tabs" aria-label="Primary navigation">
    {% for link in site.data.navigation.main %}
      <a class="site-tab {% if page.url == link.url %}active{% endif %}" href="{{ link.url }}" {% if page.url == link.url %}aria-current="page"{% endif %}>{{ link.title }}</a>
    {% endfor %}
  </nav>
</header>
